<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-400 to-blue-500 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-2xl shadow-xl w-96">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">로그인</h2>
    <form>
      <div class="mb-4">
        <label class="block text-gray-600 mb-2">이메일</label>
        <input type="email" class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="example@email.com">
      </div>
      <div class="mb-6">
        <label class="block text-gray-600 mb-2">비밀번호</label>
        <input type="password" class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="********">
      </div>
      <button type="submit" class="w-full bg-indigo-500 text-white py-3 rounded-xl hover:bg-indigo-600 transition duration-300">로그인</button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-500">계정이 없으신가요? <a href="#" class="text-indigo-600 font-medium">회원가입</a></p>
  </div>
</body>
</html>
