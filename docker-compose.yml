# 모든 페이지는 동적으로 생성한다. (SSR 방식)
# 그러므로 서브도메인으로의 접근은 리버스 프록시를 사용하여, Next.js로 연결한다.
# nginx 컨테이너는 SSR에 사용되는 정적 파일과, PHP-FPM에 사용되는 정적 파일을 서빙한다.

services:
  # Next.js 서비스 (React 프론트엔드)
  nextjs:
    image: node:18 # Node.js 18 버전 이미지 사용
    container_name: nextjs # Docker 컨테이너 이름
    working_dir: /app # 컨테이너 내부의 작업 디렉터리 설정
    volumes:
      - ./frontend:/app # 로컬 frontend 폴더를 컨테이너의 /app에 마운트
    ports:
      - "127.0.0.1:8445:3000" # 로컬호스트 8445번 포트를 컨테이너의 3000번 포트에 연결 (8445를 'log-analyzer' 서브도메인을 처리하는 프록시 주소로 설정함.)
    command: /bin/sh -c "npm install && npm install bcrypt && npm run dev" # 개발 서버 실행 명령
    environment:
      # 환경 변수 NODE_ENV로 실행 모드를 지정
      NODE_ENV: development # 현재는 개발 모드 활성화
      # NODE_ENV: production # 운영 모드 (활성화 시 주석 제거)
      # NODE_ENV: test       # 테스트 모드 (활성화 시 주석 제거)
    networks:
      - loganalyzer_net # 지정된 네트워크에 연결

  # PHP-Apache 서비스 (백엔드 API 및 Reverse Proxy)
  php-apache:
    image: php:8.1-apache # PHP 8.1 Apache 이미지
    container_name: php-apache # Docker 컨테이너 이름
    volumes:
      - ./backend:/var/www/html # 로컬 backend 폴더를 컨테이너의 /var/www/html에 마운트
      - /var/log/apache2:/webLogs:ro # Apache 로그를 읽기 전용으로 마운트
      - ./readLog:/readLog # 로그를 읽어들이는 스크립트 경로 마운트.
      - ./apache:/etc/apache2/sites-available # Apache 커스텀 설정을 마운트
    command: /bin/sh -c "apt-get update && apt-get install -y curl && php /readLog/init.php & apache2-foreground"  # PHP 스크립트 실행 후 Apache 시작 명령
    # 주의! command 옵션은 apache의 기본 시작 명령을 대체함. => apache2-foreground 명령으로 apache를 실행해야 한다.
    expose:
      - "80"  # 내부적으로만 80번 포트 노출함.
    depends_on:
      - nextjs # PHP-Apache는 Next.js 서비스가 먼저 시작되어야 동작
      - ollama # PHP-Apache는 Ollama 서비스가 먼저 시작되어야 동작
    networks:
      - loganalyzer_net # 지정된 네트워크에 연결

  # Ollama 서비스 (즉시 사용 가능하도록 설정)
  ollama:
    image: ollama/ollama # Ollama 이미지 사용
    container_name: ollama # Docker 컨테이너 이름
    restart: unless-stopped # 컨테이너가 중지되면 자동으로 재시작
    ports:
      - "127.0.0.1:11434:11434" # 로컬호스트 11434번 포트를 컨테이너의 11434번 포트에 연결
    volumes:
      - ollama_data:/root/.ollama  # 모델 데이터를 유지하기 위해 볼륨 마운트
    entrypoint: ["/bin/sh", "-c"] # 셸을 사용하여 명령 실행
    command:
      - |
        ollama serve &  # Ollama 서버 실행
        sleep 2  # 서버 시작 대기
        ollama pull llama3.2:1b  # 모델 사전 다운로드
        wait  # 백그라운드 실행 유지
    networks:
      - loganalyzer_net # 지정된 네트워크에 연결
      
  # MySQL 서비스 (데이터베이스)
  mysql:
    image: mysql:8.0 # MySQL 8.0 이미지 사용
    container_name: mysql # Docker 컨테이너 이름
    restart: unless-stopped # 컨테이너가 중지되면 자동으로 재시작
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql      # 데이터 영구 저장
      - ./mysql/init:/docker-entrypoint-initdb.d  # 초기화 스크립트
    #ports:
    #  - "127.0.0.1:3306:3306"         # localhost에서만 접근 가능
    expose:
      - "3306"  # 내부적으로만 3306번 포트 노출함.
    networks:
      - loganalyzer_net # 지정된 네트워크에 연결

# 네트워크 설정
networks:
  loganalyzer_net:
    driver: bridge # 기본 브리지 네트워크 설정

volumes:
  ollama_data:
    driver: local
  mysql_data:     # MySQL 데이터 볼륨 추가
    driver: local
